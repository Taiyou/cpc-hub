name: Papers pipeline

# Daily cron: fetch new arXiv papers into Notion, sync approved Notion
# rows into content/papers/*.md, refresh YouTube videos, and commit any diff.
#
# Manual trigger: workflow_dispatch (run on demand from the Actions tab).
#
# Required repository secrets:
#   NOTION_TOKEN     — Internal Integration token (starts with ntn_)
#   NOTION_DB_ID     — Database ID for "CPC Papers" (32 hex chars)
#   YOUTUBE_API_KEY  — YouTube Data API v3 key

on:
  schedule:
    # 03:17 UTC = 12:17 JST. Avoid round-hour to dodge GitHub cron congestion.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip arXiv fetch (Notion → site only)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: papers-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch arXiv → Notion
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: npm run fetch:arxiv

      - name: Sync Notion → content/papers
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: npm run sync:papers

      - name: Fetch YouTube → videos.json
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run fetch:youtube

      - name: Commit & push if changed
        run: |
          git config user.name  "cpc-hub-bot"
          git config user.email "cpc-hub-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain content/papers src/data/videos.json)" ]]; then
            git add content/papers src/data/videos.json
            git commit -m "chore(content): sync papers + YouTube [skip ci]"
            git push
          else
            echo "No content changes."
          fi
