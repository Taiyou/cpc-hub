name: Papers pipeline

# Daily cron: fetch new arXiv papers into Notion, sync approved Notion
# rows into content/papers/*.md, refresh YouTube videos, and commit any diff.
#
# Manual trigger: workflow_dispatch (run on demand from the Actions tab).
#
# Required repository secrets:
#   NOTION_TOKEN     — Internal Integration token (starts with ntn_)
#   NOTION_DB_ID     — Database ID for "CPC Papers" (32 hex chars)
#   YOUTUBE_API_KEY  — YouTube Data API v3 key

on:
  schedule:
    # 03:17 UTC = 12:17 JST. Avoid round-hour to dodge GitHub cron congestion.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip arXiv fetch (Notion → site only)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: papers-pipeline
  cancel-in-progress: false

jobs:
  # arXiv → Notion → content/papers. Isolated so a slow/flaky arXiv or
  # Notion call can't block the YouTube refresh below.
  papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch arXiv → Notion
        if: ${{ github.event.inputs.skip_fetch != 'true' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: npm run fetch:arxiv

      - name: Sync Notion → content/papers
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: npm run sync:papers

      - name: Commit & push if changed
        run: |
          git config user.name  "cpc-hub-bot"
          git config user.email "cpc-hub-bot@users.noreply.github.com"
          if [[ -z "$(git status --porcelain content/papers)" ]]; then
            echo "No paper changes."; exit 0
          fi
          git add content/papers
          git commit -m "chore(papers): sync from Notion [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i…"; sleep 3
          done
          exit 1

  # YouTube → src/data/videos.json. Independent job so it always runs
  # on the daily cron regardless of the papers job's outcome.
  youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch YouTube → videos.json
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run fetch:youtube

      - name: Commit & push if changed
        run: |
          git config user.name  "cpc-hub-bot"
          git config user.email "cpc-hub-bot@users.noreply.github.com"
          if [[ -z "$(git status --porcelain src/data/videos.json)" ]]; then
            echo "No video changes."; exit 0
          fi
          git add src/data/videos.json
          git commit -m "chore(videos): sync from YouTube [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i…"; sleep 3
          done
          exit 1
